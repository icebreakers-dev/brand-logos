<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icebreakers Logos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="IBTV Logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      background-color: #000000;
      font-family: 'Arial', sans-serif;
      color: #FFFFFF;
      margin: 0;
      padding: 0;
      text-align: center;
      line-height: 1.6;
    }
    header {
      padding: 1.5rem 1rem;
    }
    header img {
      width: 120px;
      max-width: 80%;
      height: auto;
    }
    header h1 {
      font-size: 2rem;
      margin: 0.5rem 0;
      word-wrap: break-word;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
    section {
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    section h2 {
      margin-top: 0;
      font-size: 1.3rem;
      color: #FFFFFF;
    }
    .logo-preview {
      margin: 1rem auto;
      max-width: 300px;
      border-radius: 8px;
      background-color: transparent;
      padding: 0.5rem;
    }
    .logo-preview img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .download-btn {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.75rem 1.5rem;
      background-color: #40E0D0;
      color: #000000;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .download-btn:hover {
      background-color: #2ACFCF;
      color: #FFFFFF;
    }
    .bg-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .bg-toggle button {
      padding: 0.4rem 0.9rem;
      border: 2px solid #40E0D0;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
      background-color: transparent;
      color: #40E0D0;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .bg-toggle button:hover,
    .bg-toggle button.active {
      background-color: #40E0D0;
      color: #000000;
    }
    .logo-preview.bg-light {
      background-color: #FFFFFF;
    }
    .logo-preview.bg-checkered {
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      background-color: #fff;
    }
    .download-all-btn {
      display: inline-block;
      margin: 0 0.5rem 1.5rem;
      padding: 0.85rem 2rem;
      background-color: #FFFFFF;
      color: #000000;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s ease;
    }
    .download-all-btn:hover {
      background-color: #40E0D0;
    }
    footer {
      font-size: 0.8rem;
      padding: 1rem;
      background-color: rgba(255, 255, 255, 0.05);
    }
    @media (max-width: 600px) {
      header img {
        width: 100px;
      }
      header h1 {
        font-size: 1.5rem;
      }
      section h2 {
        font-size: 1.1rem;
      }
      .download-btn {
        display: block;
        width: 80%;
        margin: 0.5rem auto;
      }
      .logo-preview {
        max-width: 80%;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="Icebreakers 2025 FOR SCREEN.png" alt="Icebreakers Logo">
    <h1>Icebreakers Brand Logos</h1>
    <p>Official Icebreakers logos for digital and print use only.</p>
  </header>

  <main>
    <div class="bg-toggle">
      <button class="active" onclick="setBg('dark', this)">Dark</button>
      <button onclick="setBg('light', this)">Light</button>
      <button onclick="setBg('checkered', this)">Checkered</button>
    </div>

    <button class="download-all-btn" onclick="downloadAll()">Download All Logos</button>

    <section>
      <h2>PNG Logos</h2>
      <div class="logo-preview">
        <img src="Icebreakers 2025 FOR SCREEN.png" alt="Icebreakers Sticker PNG Preview" loading="lazy">
      </div>
      <a class="download-btn" href="Icebreakers 2025 FOR SCREEN.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="whiteicebreakersartesianspringwater.png.png" alt="White Icebreakers Logo PNG Preview" loading="lazy">
      </div>
      <a class="download-btn" href="whiteicebreakersartesianspringwater.png.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="True Black Black Icebreakers Vector with Artesian Spring Water.png" alt="Black Icebreakers Logo PNG Preview" loading="lazy">
      </div>
      <a class="download-btn" href="True Black Black Icebreakers Vector with Artesian Spring Water.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="qrcode.png" alt="Icebreakers QR Code" loading="lazy">
      </div>
      <a class="download-btn" href="qrcode.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="Icebreakers Foundation 1920x1080.png" alt="Icebreakers Foundation Logo" loading="lazy">
      </div>
      <a class="download-btn" href="Icebreakers Foundation 1920x1080.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="Icebreakers Foundation QR Code.png" alt="Icebreakers Foundation QR Code" loading="lazy">
      </div>
      <a class="download-btn" href="Icebreakers Foundation QR Code.png" download>Download PNG</a>
      <div class="logo-preview">
        <img src="IBTV Logo.png" alt="Icebreakers TV" loading="lazy">
      </div>
      <a class="download-btn" href="IBTV Logo.png" download>Download PNG</a>
    </section>
  </main>

  <script>
    const logos = [
      "Icebreakers 2025 FOR SCREEN.png",
      "whiteicebreakersartesianspringwater.png.png",
      "True Black Black Icebreakers Vector with Artesian Spring Water.png",
      "qrcode.png",
      "Icebreakers Foundation 1920x1080.png",
      "Icebreakers Foundation QR Code.png",
      "IBTV Logo.png"
    ];

    function setBg(mode, btn) {
      document.querySelectorAll('.logo-preview').forEach(el => {
        el.classList.remove('bg-light', 'bg-checkered');
        if (mode === 'light') el.classList.add('bg-light');
        if (mode === 'checkered') el.classList.add('bg-checkered');
      });
      document.querySelectorAll('.bg-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function downloadAll() {
      const btn = document.querySelector('.download-all-btn');
      btn.textContent = 'Preparing ZIP...';
      btn.disabled = true;

      const zip = new JSZip();
      await Promise.all(logos.map(async name => {
        const res = await fetch(name);
        const blob = await res.blob();
        zip.file(name, blob);
      }));

      const content = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = 'Icebreakers-Logos.zip';
      a.click();
      URL.revokeObjectURL(a.href);

      btn.textContent = 'Download All Logos';
      btn.disabled = false;
    }
  </script>

  <footer>
    &copy; 2025 Icebreakers Water. All rights reserved.<br>
    <a href="https://www.icebreakerswater.com" target="_blank" style="color: #40E0D0; font-size: 0.75rem; text-decoration: none;">www.icebreakerswater.com</a>
  </footer>
</body>
</html>
